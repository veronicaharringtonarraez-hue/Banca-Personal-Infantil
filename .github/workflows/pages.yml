name: Desplegar Banco Crece en GitHub Pages

on:
  # Publica automáticamente cada vez que se actualiza la rama principal.
  push:
    branches: [main, master]
  # Permite publicar manualmente desde la pestaña "Actions".
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Solo un despliegue a la vez.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir el sitio (todo el repositorio)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
